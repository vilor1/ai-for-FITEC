<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🧠 IA Avançada</title>
<style>
body{background:#111;color:white;font-family:sans-serif;padding:40px;}
.card{background:#1e1e1e;padding:20px;margin-bottom:20px;border-radius:10px;}
input,select{width:100%;padding:10px;margin-bottom:10px;background:#333;color:white;border:none;}
button{width:100%;padding:10px;background:#0070f3;color:white;border:none;cursor:pointer;}
#resultado{margin-top:20px;color:#0f0;font-weight:bold;white-space:pre-line;}
</style>
</head>
<body>
<h1>🧠 IA Engine Avançada</h1>

<div class="card">
<h3>Treinar IA</h3>
<input id="fraseTreino" placeholder="Frase">
<input id="categoriaTreino" placeholder="Categoria">
<input id="respostaTreino" placeholder="Resposta padrão">
<button onclick="treinar()">Treinar</button>
</div>

<div class="card">
<h3>Testar IA</h3>
<input id="fraseTeste" placeholder="Digite algo">
<select id="modo">
<option value="intencao">Modo Intenção</option>
<option value="resposta">Modo Resposta</option>
</select>
<input id="userTeste" placeholder="Usuário (opcional)">
<button onclick="testar()">Testar</button>
<div id="resultado"></div>
</div>

<script>
async function treinar(){
    const frase=document.getElementById("fraseTreino").value
    const categoria=document.getElementById("categoriaTreino").value
    const resposta=document.getElementById("respostaTreino").value
    if(!frase||!categoria){alert("Preencha frase e categoria");return}
    await fetch("/api/train",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({frase,categoria,resposta})})
    alert("Treinado com sucesso!")
}

async function testar(){
    const frase=document.getElementById("fraseTeste").value
    const modo=document.getElementById("modo").value
    const user=document.getElementById("userTeste").value||"anon"
    const resDiv=document.getElementById("resultado")
    if(!frase){resDiv.innerText="Digite algo";return}
    resDiv.innerText="Pensando..."
    const res=await fetch("/api/test",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({frase,modo,user})})
    const data=await res.json()
    let texto=`📝 Intenção: ${data.intencao}\n⚡ Confiança: ${data.confianca}`
    if(modo==="resposta"){texto+=`\n💬 Resposta: ${data.resposta}`}
    resDiv.innerText=texto
}
</script>

</body>
</html>
