<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IA Engine do Zero</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
padding:40px;
}

.card{
background:#1e1e1e;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#333;
color:white;
border:none;
}

button{
width:100%;
padding:10px;
background:#0070f3;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<h1>IA Engine do Zero</h1>

<div class="card">

<h3>Treinar</h3>

<input id="fraseTreino" placeholder="Frase">

<input id="categoriaTreino" placeholder="Categoria">

<input id="respostaTreino"
placeholder="Resposta opcional">

<button onclick="treinar()">
Treinar
</button>

</div>

<div class="card">

<h3>Testar</h3>

<input id="fraseTeste"
placeholder="Digite algo">

<select id="modo">

<option value="intencao">
Modo intenção
</option>

<option value="resposta">
Modo resposta
</option>

</select>

<button onclick="testar()">
Testar
</button>

<div id="resultado"></div>

</div>

<script>

async function treinar(){

const frase =
document.getElementById(
"fraseTreino").value

const categoria =
document.getElementById(
"categoriaTreino").value

const resposta =
document.getElementById(
"respostaTreino").value

await fetch("/api/train",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
frase,
categoria,
resposta
})

})

alert("Treinado")

}

async function testar(){

const frase =
document.getElementById(
"fraseTeste").value

const modo =
document.getElementById(
"modo").value

const res = await fetch(
"/api/test",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
frase,
modo
})
})

const data = await res.json()

document.getElementById(
"resultado"
).innerText =
JSON.stringify(data,null,2)

}

</script>

</body>
</html>
